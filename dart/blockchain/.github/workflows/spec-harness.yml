name: Spec Harness

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  spec-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: bash tool/check.sh
