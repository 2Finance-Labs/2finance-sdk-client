id: lifecycle.send.client-direct-start
title: Client can deploy and start a sending lifecycle directly
kind: e2e
owner: lifecycle
systems:
  - client_2finance
  - 2finance-sdk-client
  - 2finance-network
  - wallet_manager
goal: >
  Prove the direct client path still works independently of MCP: the client
  deploys the sending lifecycle contract, starts a send request, receives a
  started log, and reads the lifecycle state.
requires:
  env:
    - FINANCE_NETWORK_URL
actors:
  - name: client
    role: calls lifecycle helper methods
  - name: signer_wallet
    role: signs client-submitted transactions
  - name: network_vm
    role: persists logs and lifecycle state
fixtures:
  provider: codexa
  provider_account_id: account-1
  external_auth_id: auth-1
  profile_id: profile-1
  source_currency: BRL
  target_currency: USD
  beneficiary_name: John Smith
  beneficiary_type: individual
  beneficiary_country: US
  currency: USD
  amount: "1000.00"
steps:
  - id: deploy-contract
    via: client_2finance
    action: deploy_contract2
    expect:
      contract_version: sendingLifecycleV1
      contract_address: non_empty
  - id: start-sending
    via: client_2finance
    action: start_sending
    expect:
      logs: non_empty
      first_log.type: SendingLifecycle_Started
  - id: get-sending
    via: client_2finance
    action: get_sending
    expect:
      states: non_empty
      lifecycle_state.request_id: non_empty
assertions:
  - id: start-log-emitted
    subject: network_log
    must:
      log_type: SendingLifecycle_Started
      first_step: quote
  - id: state-readable
    subject: lifecycle_state
    must:
      request_id: non_empty
      status: present
