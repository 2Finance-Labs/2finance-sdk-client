id: lifecycle.send.mcp-sign-submit
title: MCP prepares send lifecycle transactions and the client signs them
kind: e2e
owner: lifecycle
systems:
  - mcp-2finance
  - client_2finance
  - go-client-2finance
  - 2finance-network
  - wallet_manager
goal: >
  Prove that the MCP/client boundary works for the sending lifecycle: MCP
  prepares unsigned transactions, the local client wallet signs, the signed
  transaction is submitted, and the lifecycle state can be read back.
requires:
  env:
    - MCP_E2E
    - MCP_URL
    - FINANCE_NETWORK_URL
actors:
  - name: mcp
    role: returns unsigned prepared transactions
  - name: client_wallet
    role: signs prepared transactions locally
  - name: network_vm
    role: accepts signed transactions and stores lifecycle state
fixtures:
  provider: wise
  currency: USD
  amount: "25.50"
  contract_version: sendingLifecycleV1
steps:
  - id: deploy-prepare
    via: mcp_http
    tool: finance.contract.deploy.prepare
    action: prepare_contract_deploy
    expect:
      workflow: contract.deploy.sendingLifecycleV1
      unsigned_transaction.method: deploy_contract2
      unsigned_transaction.hash: ""
      unsigned_transaction.signature: ""
  - id: deploy-sign
    via: wallet_manager
    action: sign_prepared_transaction
    expect:
      signed_transaction.hash: non_empty
      signed_transaction.signature: non_empty
  - id: deploy-submit
    via: mcp_http
    tool: finance.transaction.submit_signed
    action: submit_signed_transaction
    expect:
      transport: ok
  - id: send-start-prepare
    via: mcp_http
    tool: finance.send.start.prepare
    action: prepare_send_start
    expect:
      workflow: send.start
      unsigned_transaction.method: start_Sending
      unsigned_transaction.data.contract_version: sendingLifecycleV1
      unsigned_transaction.hash: ""
      unsigned_transaction.signature: ""
  - id: send-start-sign
    via: wallet_manager
    action: sign_prepared_transaction
    expect:
      signed_transaction.hash: non_empty
      signed_transaction.signature: non_empty
  - id: send-start-submit
    via: mcp_http
    tool: finance.transaction.submit_signed
    action: submit_signed_transaction
    expect:
      transport: ok
  - id: send-get
    via: mcp_http
    tool: finance.send.get
    action: get_send_lifecycle
    expect:
      lifecycle_state.status: transfer_requested
      lifecycle_state.current_step: transfer
      lifecycle_state.next_command: present
assertions:
  - id: mcp-never-signs
    subject: prepared_transaction
    must:
      hash: empty
      signature: empty
  - id: client-signs-before-submit
    subject: signed_transaction
    must:
      hash: non_empty
      signature: non_empty
  - id: lifecycle-readable-after-submit
    subject: lifecycle_state
    must:
      request_id: non_empty
      next_command: present
